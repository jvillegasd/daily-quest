services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/dailyquest
      - NEXTAUTH_URL=${NEXTAUTH_URL:-https://daily-quest.jvillegasd.com}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - coolify
      - default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.daily-quest.rule=Host(`daily-quest.jvillegasd.com`)"
      - "traefik.http.routers.daily-quest.entrypoints=https"
      - "traefik.http.routers.daily-quest.tls=true"
      - "traefik.http.routers.daily-quest.tls.certresolver=letsencrypt"
      - "traefik.http.services.daily-quest.loadbalancer.server.port=3000"

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: dailyquest
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dailyquest"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - default

networks:
  coolify:
    external: true
  default:

volumes:
  postgres_data:
